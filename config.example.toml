# sprite-env configuration
# Copy this file to config.toml and customize for your setup.

# GitHub repo to clone as the app (e.g. "svycal/appointments-app")
app_repo = ""

# App setup script (relative to ~/app, default: script/sprite-setup)
# app_setup_cmd = "script/sprite-setup"

# ---------------------------------------------------------------------------
# Personal: dotfiles
# ---------------------------------------------------------------------------

# Git repo URL for your dotfiles (leave empty to skip)
dotfiles_repo = ""

# Command to run after cloning dotfiles (relative to the dotfiles dir)
dotfiles_bootstrap_cmd = "./install.sh"

# ---------------------------------------------------------------------------
# Personal: editor
# ---------------------------------------------------------------------------

# Preferred editor: "nvim", "none", or leave empty to skip
editor = "nvim"

# ---------------------------------------------------------------------------
# Personal: shell
# ---------------------------------------------------------------------------

# Enable tmux and create a dev-start layout script
tmux = true

# Install starship prompt
starship = false
